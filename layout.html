<html>
<head>
    <title>My Side by Side Layout</title>
<style>
    #defaultblock {
        display: table;
    }
    div {
        float: left;
        height: 600px; /* I made this taller to fit your widgets */
        width: 350px;  /* I made this wider so widgets don't get cut off */
        padding: 10px;
    }
    #block1 {
        background-color: #99ff66; /* Green */
    }
    #block2 {
        background-color: #66ccff; /* Blue */
    }
    #block3 {
        background-color: #ff99ff; /* Pink */
    }
    h2 {
        text-align: center;
        font-family: Verdana;
    }
</style>
</head>

<body>
    <main id="defaultblock">
        <h2>My TDSB Dashboard</h2>

        <div id="block1">
            <h2>About Me</h2>
            <p>This is my first side-by-side website layout!</p>
            </div>

        <div id="block2">
            <h2>Weather</h2>
            <a class="weatherwidget-io" href="https://forecast7.com/en/43d78n79d23/scarborough/" data-label_1="SCARBOROUGH" data-label_2="WEATHER" data-theme="original" >SCARBOROUGH WEATHER</a>
            <script>
            !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
            </script>
        </div>

        <div id="block3">
            <h2>Schedule</h2>
            <iframe src="https://calendar.google.com/calendar/embed?src=350276354%40tdsb.ca&ctz=America%2FToronto" style="border: 0" width="330" height="400" frameborder="0" scrolling="no"></iframe>
        </div>

    </main>
</body>
</html>
